name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Compile firmware (ESP32-C6)
    runs-on: ubuntu-latest

    # Use Espressif's pre-built image that ships both ESP-IDF and the
    # esp-matter SDK ready to use — no manual SDK installation needed.
    container:
      # release-v1.5 (IDF 5.4.1) — released 2026-03-25.
      # release-v1.3 has a stale Python env (cryptography>=44 vs <42 constraint).
      # release-v1.4/latest has an ESP Matter/connectedhomeip API mismatch
      # (EncodableToTLV header not resolved, breaking esp_matter_client.cpp).
      # release-v1.5 ships consistent components and a current Python env.
      image: espressif/esp-matter:release-v1.5_idf_v5.4.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Fix git safe.directory
        # GitHub Actions checks out code owned by a different UID than the
        # container user, causing git to refuse rev-parse during the build.
        run: git config --global --add safe.directory '*'

      - name: Build firmware
        shell: bash
        run: |
          # Source ESP-IDF and esp-matter environment
          . "$IDF_PATH/export.sh"
          . "$ESP_MATTER_PATH/export.sh"

          # Set ESP32-C6 as the build target
          idf.py set-target esp32c6

          # Full build — exits non-zero on any error, failing the job
          idf.py build
