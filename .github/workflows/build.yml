name: Build ESP Firmware (ESP-IDF)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# One build at a time per branch. When a PR is opened for a branch that has a
# push build still running, the push build is cancelled and the pull_request
# build (which checks out the merge ref) takes over. If the push build already
# finished, the PR build simply runs and validates the merge result.
# github.head_ref is set on pull_request events (the branch name);
# github.ref_name is used for push events (also the branch name).
concurrency:
  group: build-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    # Still skip pull_request builds from external forks: those don't have a
    # corresponding push event in this repo, so no cancellation is possible and
    # we do want CI to run for them.
    if: >
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache managed components
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            managed_components
            dependencies.lock
          key: ${{ runner.os }}-components-${{ hashFiles('main/idf_component.yml') }}
          restore-keys: |
            ${{ runner.os }}-components-

      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@e6f5c74232b1ccd4c97ed641f1e48553853f1fd5 # v1.2.0
        with:
          esp_idf_version: v5.5.3
          target: esp32c6
          path: .

      - name: Upload firmware artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: esp-idf-firmware
          path: |
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/*.bin
