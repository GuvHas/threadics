name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Compile firmware (ESP32-C6)
    runs-on: ubuntu-latest

    # Use Espressif's pre-built image that ships both ESP-IDF and the
    # esp-matter SDK ready to use — no manual SDK installation needed.
    container:
      # release-v1.3 (IDF 5.2.3) is the last stable release without the
      # v1.4 API mismatch between esp_matter_client.cpp and the bundled
      # connectedhomeip SDK (EncodableToTLV header resolution failure).
      image: espressif/esp-matter:release-v1.3_idf_v5.2.3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Fix git safe.directory
        # GitHub Actions checks out code owned by a different UID than the
        # container user, causing git to refuse rev-parse during the build.
        run: git config --global --add safe.directory '*'

      - name: Build firmware
        shell: bash
        run: |
          # Source ESP-IDF and esp-matter environment
          . "$IDF_PATH/export.sh"
          . "$ESP_MATTER_PATH/export.sh"

          # Set ESP32-C6 as the build target
          idf.py set-target esp32c6

          # Full build — exits non-zero on any error, failing the job
          idf.py build
